name: Docker Hub Frontend

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@hoelk-f"
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend
      - name: Build library
        run: npm run build:lib
        working-directory: ./frontend
      - name: Bump version for publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: ./frontend
        run: |
          node - <<'NODE'
          const { execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');
          const pkg = require('./package.json');

          const parse = (v) => v.split('.').map((n) => parseInt(n, 10));
          const cmp = (a, b) => {
            const pa = parse(a);
            const pb = parse(b);
            for (let i = 0; i < 3; i += 1) {
              const da = Number.isFinite(pa[i]) ? pa[i] : 0;
              const db = Number.isFinite(pb[i]) ? pb[i] : 0;
              if (da > db) return 1;
              if (da < db) return -1;
            }
            return 0;
          };
          const bumpPatch = (v) => {
            const [a, b, c] = parse(v);
            const na = Number.isFinite(a) ? a : 0;
            const nb = Number.isFinite(b) ? b : 0;
            const nc = Number.isFinite(c) ? c : 0;
            return `${na}.${nb}.${nc + 1}`;
          };

          let latest = '';
          try {
            latest = execSync(
              'npm view @hoelk-f/semantic-data-catalog version --registry https://npm.pkg.github.com',
              { encoding: 'utf8' }
            ).trim();
          } catch (err) {
            latest = '';
          }

          let base = pkg.version;
          if (latest && cmp(latest, base) >= 0) {
            base = latest;
          }

          const next = bumpPatch(base);
          console.log(`Current version: ${pkg.version}`);
          if (latest) console.log(`Published version: ${latest}`);
          console.log(`Bumping to: ${next}`);
          execSync(`npm version ${next} --no-git-tag-version`, { stdio: 'inherit' });
          fs.writeFileSync(
            path.join(process.cwd(), 'src', 'version.js'),
            `export const appVersion = "${next}";\n`,
            'utf8'
          );
          NODE
      - name: Publish package
        run: npm publish
        working-directory: ./frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN_FRONTEND }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: son1i/semantic-data-catalog-frontend:latest
      - name: Trigger solid-dataspace-manager rebuild
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: ./frontend
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "Missing secret NPM_TOKEN" >&2
            exit 1
          fi

          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          for attempt in $(seq 1 12); do
            PUBLISHED_VERSION=$(npm view @hoelk-f/semantic-data-catalog version --registry https://npm.pkg.github.com 2>/dev/null || true)
            if [ "$PUBLISHED_VERSION" = "$PACKAGE_VERSION" ]; then
              break
            fi

            if [ "$attempt" -eq 12 ]; then
              echo "Published package version did not become visible in time. Expected $PACKAGE_VERSION, got ${PUBLISHED_VERSION:-<empty>}." >&2
              exit 1
            fi

            sleep 10
          done

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${NPM_TOKEN}" \
            https://api.github.com/repos/hoelk-f/solid-dataspace-manager/dispatches \
            -d "{\"event_type\":\"semantic-data-catalog-released\",\"client_payload\":{\"package\":\"@hoelk-f/semantic-data-catalog\",\"version\":\"${PACKAGE_VERSION}\"}}"
